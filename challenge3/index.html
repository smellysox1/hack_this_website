
<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Challenge 2</title>
</head>
<body class="d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="d-flex flex-column justify-contesnt-center">
        <span class="text-center pb-3">Enter your username to check we have you.</span>
         
        <div class="input-group">            
            <input class="form-control" id="username">
            <button id="submit" class="btn btn-primary" onclick="checkUsername()">Submit</button>
        </div>
        <div id="incorrect" class="alert alert-danger p-2 mt-4 d-none">Incorrect password. Please try again.</div>
        <div id="correct" class="alert alert-success p-2 mt-4 d-none">We found you. is this you?</div>
    </div>
      <script src='https://sql.js.org/dist/sql-wasm.js'></script>
    <script>
        config = {
            locateFile: filename => `https://sql.js.org/dist/${filename}`
        }
    // The `initSqlJs` function is globally provided by all of the main dist files if loaded in the browser.
    // We must specify this locateFile function if we are loading a wasm file from anywhere other than the current html page's folder.
         function checkUsername(){
            initSqlJs(config).then(function(SQL){
           
                
                var db=new SQL.Database();
                let baseprompt="CREATE TABLE users (username varchar, password varchar); \
INSERT INTO users VALUES ('Mr_sir','xae#38jeufb'); \
INSERT INTO users VALUES ('james_s1526', '49jsu8jdSQeaL')";
                db.run(baseprompt);
                let prompt="SELECT username FROM users WHERE username='"+document.getElementById("username").value+"'";
                console.log(prompt);
                const person=db.exec(prompt);
                console.log("person found.: ");
                
                if (person[0].values[0]==undefined){
                    document.getElementById("username").value = "";
                     document.getElementById("incorrect").classList.remove("d-none");
                }else{
                    console.log(person[0].values);
                    document.getElementById("incorrect").classList.add("d-none");
                    document.getElementById("correct").innerHTML="we found you! are you "+person[0].values[0]+"?"
                    document.getElementById("correct").classList.remove("d-none");

                }
            });
        }
    </script>
</body>
</html>
