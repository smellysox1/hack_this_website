<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Challenge 2</title>
</head>
<body class="d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="d-flex flex-column justify-content-center">
        <span class="text-center pb-3">Enter your password to continue</span>
        <div class="input-group">
            <input class="form-control" type="password" id="passwordInput">
            <button id="submit" class="btn btn-primary" onclick="checkPassword()">Submit</button>
        </div>
        <div id="incorrect" class="alert alert-danger p-2 mt-4 d-none">Incorrect password. Please try again.</div>
        <div id="correct" class="alert alert-success p-2 mt-4 d-none">Correct password. <a href="/hack_this_website/Dash" class="alert-link">Go to your dashboard</a></div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById("passwordInput").value == "passwordHere") {
                document.getElementById("incorrect").classList.add("d-none");
                document.getElementById("correct").classList.remove("d-none");
            } else {
                document.getElementById("passwordInput").value = "";
                document.getElementById("incorrect").classList.remove("d-none");
            }
        }
    </script>
</body>
</html>
